name: Build PIE Matrix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create matrix-builder script
        run: |
          cat > build_matrix.js << 'JSEOF'
          const fs = require('fs');
          const path = require('path');
          const readline = require('readline');

          const ROOTS_PATH = './linguistic_data/pie/pie_roots.json';
          const CITATIONS_PATH = './linguistic_data/pie/pie_citations.jsonl';
          const OUT_DIR = './linguistic_data/pie';
          const MATRIX_PATH = path.join(OUT_DIR, 'pie_matrix.jsonl');
          const UNMATCHED_PATH = path.join(OUT_DIR, 'pie_matrix_unmatched.jsonl');
          const SUMMARY_PATH = path.join(OUT_DIR, 'pie_matrix_summary.json');

          function log(msg) { console.log(`[matrix] ${msg}`); }

          // Same normalize function already used and tested in Root & Gloss.
          function normalize(str) {
            return (str || '')
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, d => '0123456789'['₀₁₂₃₄₅₆₇₈₉'.indexOf(d)])
              .replace(/[^a-z0-9\s*-]/g, '')
              .replace(/[*-]/g, '')
              .trim();
          }

          // Hand-built branch lookup, keyed on the exact `lang` name string
          // wiktextract uses. Not exhaustive — covers the branches from the
          // reference chart plus their attested/modern stages. Anything not
          // listed here falls into "Unclassified" rather than being dropped.
          // Expanded against the actual 373-language distribution from the
          // real scan output (2026-07-16), not just the reference chart's
          // top-level list. Genuinely ambiguous/disputed branch assignments
          // (Venetic, Lusitanian, Messapic — scholarly disagreement on
          // where they even belong) are deliberately left unmapped rather
          // than guessed. Non-Indo-European languages that picked up a
          // stray citation (Finnish, Basque, Hebrew, Turkish, etc.) are
          // correctly left unmapped too — that's accurate, not a gap.
          const BRANCH_BY_LANG = {
            // Anatolian
            'Hittite': 'Anatolian', 'Luwian': 'Anatolian', 'Lycian': 'Anatolian',
            'Lydian': 'Anatolian', 'Palaic': 'Anatolian', 'Carian': 'Anatolian',
            // Armenian
            'Armenian': 'Armenian', 'Old Armenian': 'Armenian', 'Classical Armenian': 'Armenian',
            'Western Armenian': 'Armenian', 'Eastern Armenian': 'Armenian', 'Middle Armenian': 'Armenian',
            // Albanian
            'Albanian': 'Albanian', 'Proto-Albanian': 'Albanian',
            // Baltic
            'Lithuanian': 'Baltic', 'Latvian': 'Baltic', 'Old Prussian': 'Baltic',
            'Proto-Baltic': 'Baltic', 'Proto-Balto-Slavic': 'Baltic', 'Old Lithuanian': 'Baltic',
            'Samogitian': 'Baltic', 'Latgalian': 'Baltic', 'Sudovian': 'Baltic',
            // Slavic
            'Russian': 'Slavic', 'Polish': 'Slavic', 'Czech': 'Slavic', 'Ukrainian': 'Slavic',
            'Bulgarian': 'Slavic', 'Serbo-Croatian': 'Slavic', 'Slovene': 'Slavic',
            'Old Church Slavonic': 'Slavic', 'Proto-Slavic': 'Slavic', 'Belarusian': 'Slavic',
            'Macedonian': 'Slavic', 'Slovak': 'Slavic', 'Old Ruthenian': 'Slavic', 'Lower Sorbian': 'Slavic',
            'Upper Sorbian': 'Slavic', 'Pannonian Rusyn': 'Slavic', 'Old East Slavic': 'Slavic',
            'Old Novgorodian': 'Slavic', 'Old Czech': 'Slavic', 'Carpathian Rusyn': 'Slavic',
            'Kashubian': 'Slavic', 'Polabian': 'Slavic', 'Old Slovak': 'Slavic', 'Old Polish': 'Slavic',
            'Silesian': 'Slavic', 'Knaanic': 'Slavic',
            // Celtic
            'Old Irish': 'Celtic', 'Irish': 'Celtic', 'Scottish Gaelic': 'Celtic', 'Welsh': 'Celtic',
            'Breton': 'Celtic', 'Cornish': 'Celtic', 'Manx': 'Celtic', 'Gaulish': 'Celtic',
            'Proto-Celtic': 'Celtic', 'Brythonic': 'Celtic', 'Goidelic': 'Celtic',
            'Proto-Brythonic': 'Celtic', 'Middle Irish': 'Celtic', 'Middle Welsh': 'Celtic',
            'Classical Gaelic': 'Celtic', 'Old Welsh': 'Celtic', 'Cumbric': 'Celtic', 'Old Cornish': 'Celtic',
            'Middle Cornish': 'Celtic', 'Primitive Irish': 'Celtic',
            // Germanic
            'English': 'Germanic', 'Old English': 'Germanic', 'Middle English': 'Germanic',
            'German': 'Germanic', 'Old High German': 'Germanic', 'Middle High German': 'Germanic',
            'Dutch': 'Germanic', 'Old Dutch': 'Germanic', 'Middle Dutch': 'Germanic',
            'Swedish': 'Germanic', 'Old Swedish': 'Germanic', 'Danish': 'Germanic', 'Old Danish': 'Germanic',
            'Norwegian': 'Germanic', 'Norwegian Nynorsk': 'Germanic', 'Norwegian Bokmål': 'Germanic',
            'Icelandic': 'Germanic', 'Old Norse': 'Germanic', 'Proto-Norse': 'Germanic',
            'Gothic': 'Germanic', 'Crimean Gothic': 'Germanic', 'Proto-Germanic': 'Germanic',
            'Proto-West Germanic': 'Germanic', 'Old Frisian': 'Germanic', 'Frisian': 'Germanic',
            'West Frisian': 'Germanic', 'North Frisian': 'Germanic', 'Saterland Frisian': 'Germanic',
            'Afrikaans': 'Germanic', 'Yiddish': 'Germanic', 'Low German': 'Germanic',
            'Old Low German': 'Germanic', 'Old Saxon': 'Germanic', 'Middle Low German': 'Germanic',
            'Faroese': 'Germanic', 'Limburgish': 'Germanic', 'Cimbrian': 'Germanic', 'Mòcheno': 'Germanic',
            'Scots': 'Germanic', 'Middle Scots': 'Germanic', 'Luxembourgish': 'Germanic',
            'Bavarian': 'Germanic', 'Alemannic German': 'Germanic', 'Hunsrik': 'Germanic',
            'Pennsylvania German': 'Germanic', 'Plautdietsch': 'Germanic', 'East Central German': 'Germanic',
            'Central Franconian': 'Germanic', 'Rhine Franconian': 'Germanic', 'Vilamovian': 'Germanic',
            'West Flemish': 'Germanic', 'Volga German': 'Germanic', 'Gottscheerish': 'Germanic',
            'Elfdalian': 'Germanic', 'Zealandic': 'Germanic', 'Unserdeutsch': 'Germanic',
            'Jamtish': 'Germanic', 'Old Gutnish': 'Germanic', 'Fala': 'Germanic',
            // Hellenic
            'Greek': 'Hellenic', 'Ancient Greek': 'Hellenic', 'Mycenaean Greek': 'Hellenic',
            'Proto-Hellenic': 'Hellenic', 'Cappadocian Greek': 'Hellenic', 'Italiot Greek': 'Hellenic',
            // Indo-Aryan
            'Sanskrit': 'Indo-Aryan', 'Hindi': 'Indo-Aryan', 'Urdu': 'Indo-Aryan', 'Bengali': 'Indo-Aryan',
            'Assamese': 'Indo-Aryan', 'Punjabi': 'Indo-Aryan', 'Marathi': 'Indo-Aryan', 'Nepali': 'Indo-Aryan',
            'Sinhalese': 'Indo-Aryan', 'Romani': 'Indo-Aryan', 'Gujarati': 'Indo-Aryan', 'Sindhi': 'Indo-Aryan',
            'Dardic': 'Indo-Aryan', 'Dard': 'Indo-Aryan', 'Prakrit': 'Indo-Aryan', 'Pali': 'Indo-Aryan',
            'Kashmiri': 'Indo-Aryan', 'Old Marathi': 'Indo-Aryan', 'Konkani': 'Indo-Aryan',
            'Old Hindi': 'Indo-Aryan', 'Old Gujarati': 'Indo-Aryan', 'Old Punjabi': 'Indo-Aryan',
            'Saraiki': 'Indo-Aryan', 'Apabhramsa': 'Indo-Aryan', 'Ashokan Prakrit': 'Indo-Aryan',
            'Old Awadhi': 'Indo-Aryan', 'Awadhi': 'Indo-Aryan', 'Niya Prakrit': 'Indo-Aryan',
            'Gandhari': 'Indo-Aryan', 'Dhivehi': 'Indo-Aryan', 'Marwari': 'Indo-Aryan', 'Magahi': 'Indo-Aryan',
            'Odia': 'Indo-Aryan', 'Varhadi': 'Indo-Aryan', 'Gojri': 'Indo-Aryan', 'Malvi': 'Indo-Aryan',
            'Kachchi': 'Indo-Aryan', 'Middle Bengali': 'Indo-Aryan', 'Pahari-Potwari': 'Indo-Aryan',
            'Ahirani': 'Indo-Aryan', 'Bhojpuri': 'Indo-Aryan', 'Sylheti': 'Indo-Aryan', 'Nimadi': 'Indo-Aryan',
            'Chhattisgarhi': 'Indo-Aryan', 'Early Assamese': 'Indo-Aryan', 'Dhundhari': 'Indo-Aryan',
            'Deccani': 'Indo-Aryan', 'Bundeli': 'Indo-Aryan', 'Varli': 'Indo-Aryan', 'Garhwali': 'Indo-Aryan',
            'Mewari': 'Indo-Aryan', 'Dogri': 'Indo-Aryan', 'Braj': 'Indo-Aryan', 'Vaghri': 'Indo-Aryan',
            'Middle Gujarati': 'Indo-Aryan', 'Maithili': 'Indo-Aryan', 'Haryanvi': 'Indo-Aryan',
            'Kalasha': 'Indo-Aryan', 'Khowar': 'Indo-Aryan',
            // Iranian
            'Avestan': 'Iranian', 'Old Persian': 'Iranian', 'Persian': 'Iranian', 'Kurdish': 'Iranian',
            'Northern Kurdish': 'Iranian', 'Central Kurdish': 'Iranian', 'Southern Kurdish': 'Iranian',
            'Pashto': 'Iranian', 'Sogdian': 'Iranian', 'Balochi': 'Iranian', 'Baluchi': 'Iranian',
            'Proto-Iranian': 'Iranian', 'Tajik': 'Iranian', 'Middle Persian': 'Iranian', 'Zazaki': 'Iranian',
            'Ossetian': 'Iranian', 'Old Median': 'Iranian', 'Proto-Scythian': 'Iranian', 'Alanic': 'Iranian',
            'Judeo-Persian': 'Iranian', 'Mazanderani': 'Iranian', 'Parthian': 'Iranian',
            'Gurani': 'Iranian', 'Proto-Nuristani': 'Iranian', 'Proto-Saka': 'Iranian',
            'Khotanese': 'Iranian', 'Tat': 'Iranian', 'Proto-Sogdic': 'Iranian',
            // Indo-Iranian (pre-split, ancestral to both branches above)
            'Proto-Indo-Iranian': 'Indo-Iranian',
            // Italic
            'Latin': 'Italic', 'Faliscan': 'Italic', 'Oscan': 'Italic', 'Umbrian': 'Italic',
            'Proto-Italic': 'Italic', 'Spanish': 'Italic', 'French': 'Italic', 'Italian': 'Italic',
            'Portuguese': 'Italic', 'Romanian': 'Italic', 'Catalan': 'Italic', 'Provencal': 'Italic',
            'Occitan': 'Italic', 'Old Occitan': 'Italic', 'Rhaeto-Romance': 'Italic', 'Ligurian': 'Italic',
            'Sardinian': 'Italic', 'Sassarese': 'Italic', 'Gallurese': 'Italic', 'Galician': 'Italic',
            'Old French': 'Italic', 'Middle French': 'Italic', 'Old Galician-Portuguese': 'Italic',
            'Sicilian': 'Italic', 'Judeo-Italian': 'Italic', 'Norman': 'Italic', 'Old Spanish': 'Italic',
            'Aromanian': 'Italic', 'Corsican': 'Italic', 'Venetan': 'Italic', 'Friulian': 'Italic',
            'Lombard': 'Italic', 'Asturian': 'Italic', 'Ladino': 'Italic', 'Romansh': 'Italic',
            'Neapolitan': 'Italic', 'Walloon': 'Italic', 'Aragonese': 'Italic', 'Dalmatian': 'Italic',
            'Megleno-Romanian': 'Italic', 'Extremaduran': 'Italic', 'Emilian': 'Italic', 'Ladin': 'Italic',
            'Leonese': 'Italic', 'Piedmontese': 'Italic', 'Istriot': 'Italic', 'Gallo': 'Italic',
            'Mozarabic': 'Italic', 'Marrucinian': 'Italic', 'Paelignian': 'Italic', 'South Picene': 'Italic',
            'North Picene': 'Italic',
            // Tocharian
            'Tocharian A': 'Tocharian', 'Tocharian B': 'Tocharian', 'Proto-Tocharian': 'Tocharian',
            // Phrygian
            'Phrygian': 'Phrygian',
          };

          function branchFor(lang) {
            return BRANCH_BY_LANG[lang] || 'Unclassified';
          }

          async function main() {
            log('Loading pie_roots.json...');
            const rootsData = JSON.parse(fs.readFileSync(ROOTS_PATH, 'utf8'));

            // Build root_id assignment + normalized lookup
            const rootIndex = new Map(); // normalized word -> { root_id, word, glosses }
            rootsData.entries.forEach((e, i) => {
              rootIndex.set(normalize(e.word), { root_id: i + 1, word: e.word, glosses: e.glosses || [] });
            });
            log(`Indexed ${rootIndex.size} PIE roots.`);

            if (!fs.existsSync(CITATIONS_PATH)) {
              throw new Error(`${CITATIONS_PATH} not found — run the citation scanner workflow first.`);
            }

            const matrixOut = fs.createWriteStream(MATRIX_PATH);
            const unmatchedOut = fs.createWriteStream(UNMATCHED_PATH);
            const rl = readline.createInterface({
              input: fs.createReadStream(CITATIONS_PATH),
              crlfDelay: Infinity
            });

            let total = 0, matched = 0, unmatched = 0;
            const branchCounts = {};

            for await (const line of rl) {
              if (!line.trim()) continue;
              total++;
              const citation = JSON.parse(line);
              const key = normalize(citation.cited_root);
              const root = rootIndex.get(key);
              if (!root) {
                unmatched++;
                unmatchedOut.write(JSON.stringify(citation) + '\n');
                continue;
              }
              matched++;
              const branch = branchFor(citation.lang);
              branchCounts[branch] = (branchCounts[branch] || 0) + 1;
              matrixOut.write(JSON.stringify({
                root_id: root.root_id,
                root_word: root.word,
                root_glosses: root.glosses,
                branch,
                daughter_word: citation.word,
                lang: citation.lang,
                lang_code: citation.lang_code
              }) + '\n');
            }

            matrixOut.end();
            unmatchedOut.end();

            log(`Total citations processed: ${total}`);
            log(`Matched to a known PIE root: ${matched}`);
            log(`Unmatched (root string not found in pie_roots.json): ${unmatched}`);

            fs.writeFileSync(SUMMARY_PATH, JSON.stringify({
              built: new Date().toISOString(),
              total_citations: total,
              matched,
              unmatched,
              match_rate: total ? (matched / total) : 0,
              by_branch: Object.entries(branchCounts).sort((a, b) => b[1] - a[1])
            }, null, 2));

            log('Done.');
          }

          main().catch(e => { console.error('Fatal:', e); process.exit(1); });
          JSEOF

      - name: Run matrix builder
        run: node build_matrix.js

      - name: Commit results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add linguistic_data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build PIE matrix [skip ci]"
            git push
          fi
